{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Cadastro RPG</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

    <video autoplay muted loop id="bg-video">
        <source src="{% static 'video/dragao.mp4' %}" type="video/mp4">
    </video>

    <div class="container">

        <div class="card" style="width: 400px; margin: 50px auto; text-align: center;">

            <h1>Criar Conta</h1>

            <form method="post">
                {% csrf_token %}

                <p>
                    <label>Usuário</label>
                    {{ form.username }}
                </p>

                <p>
                    <label>Senha</label>
                    {{ form.password1 }}
                </p>

                <p>
                    <label>Confirmar Senha</label>
                    {{ form.password2 }}
                </p>

                {% if form.errors %}
                    <div class="errorlist">
                        {{ form.errors }}
                    </div>
                {% endif %}

                <button type="submit" class="button">
                    Cadastrar
                </button>

            </form>

            <br>

            <a href="{% url 'login' %}">
                Já possui uma conta? Entrar
            </a>

        </div>

    </div>

</body>

</html>
